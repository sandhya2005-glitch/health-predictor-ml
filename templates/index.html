<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Health Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:30px 15px;

    overflow-y:auto;

    background:
    radial-gradient(circle at top left,#2563eb55,transparent 30%),
    radial-gradient(circle at bottom right,#9333ea55,transparent 30%),
    #020617;
}

.container{

    width:780px;

    padding:32px;

    border-radius:32px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);

    box-shadow:
    0 0 30px rgba(0,255,255,0.06),
    0 0 60px rgba(139,92,246,0.06);
}

.title{

    text-align:center;

    margin-bottom:30px;
}

.title h1{

    font-size:42px;

    font-weight:700;

    margin-bottom:8px;

    background:linear-gradient(to right,#38bdf8,#818cf8,#c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.title p{

    color:#cbd5e1;
}

.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;
}

.input-box{

    display:flex;

    flex-direction:column;
}

.input-box label{

    margin-bottom:8px;

    color:#f8fafc;
}

.input-box input,
.input-box select{

    width:100%;

    padding:15px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.08);

    background:rgba(255,255,255,0.06);

    color:white;

    outline:none;

    font-size:14px;
}

.input-box input::placeholder{

    color:#94a3b8;
}

select option{

    background:#0f172a;

    color:white;
}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    background:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6);

    color:white;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    margin-top:28px;
}

.result{

    margin-top:35px;

    padding:28px;

    border-radius:28px;

    text-align:center;

    background:linear-gradient(
    135deg,
    rgba(59,130,246,0.10),
    rgba(139,92,246,0.08)
    );

    border:1px solid rgba(255,255,255,0.08);
}

.result h2{

    font-size:30px;

    margin-bottom:18px;
}

.circle{

    width:150px;
    height:150px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:22px auto;

    position:relative;
}

.circle::before{

    content:'';

    position:absolute;

    width:110px;
    height:110px;

    border-radius:50%;

    background:#020617;
}

.circle span{

    position:relative;

    color:white;

    font-size:30px;

    font-weight:bold;
}

.result h3{

    color:#38bdf8;

    margin-bottom:12px;

    font-size:24px;
}

.result p{

    color:#e2e8f0;

    line-height:1.7;
}

@media(max-width:850px){

.form-grid{

    grid-template-columns:1fr;
}

.title h1{

    font-size:34px;
}

}

</style>

</head>

<body>

<div class="container">

    <div class="title">

        <h1>🧠 Health Predictor</h1>

        <p>AI Powered Wellness Monitoring System</p>

    </div>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div class="input-box">

                <label>Gender</label>

                <select name="gender">

                    <option value="Male"
                    {% if gender == "Male" %}selected{% endif %}>
                    Male
                    </option>

                    <option value="Female"
                    {% if gender == "Female" %}selected{% endif %}>
                    Female
                    </option>

                </select>

            </div>

            <div class="input-box">

                <label>Age</label>

                <input type="number"
                name="age"
                value="{{age if age else ''}}"
                placeholder="Example : 20"
                required>

            </div>

            <div class="input-box">

                <label>Height (cm)</label>

                <input type="number"
                name="height"
                value="{{height if height else ''}}"
                placeholder="Example : 170"
                required>

            </div>

            <div class="input-box">

                <label>Weight (kg)</label>

                <input type="number"
                name="weight"
                value="{{weight if weight else ''}}"
                placeholder="Example : 70"
                required>

            </div>

            <div class="input-box">

                <label>Sleep Duration (Hours)</label>

                <input type="number"
                name="sleep"
                value="{{sleep if sleep else ''}}"
                placeholder="Example : 7"
                required>

            </div>

            <div class="input-box">

                <label>Sleep Quality (Out of 10)</label>

                <input type="number"
                name="quality"
                value="{{quality if quality else ''}}"
                placeholder="Rate from 1 to 10"
                required>

            </div>

            <div class="input-box">

                <label>Physical Activity (Minutes)</label>

                <input type="number"
                name="activity"
                value="{{activity if activity else ''}}"
                placeholder="Example : 30"
                required>

            </div>

            <div class="input-box">

                <label>Stress Level (Out of 10)</label>

                <input type="number"
                name="stress"
                value="{{stress if stress else ''}}"
                placeholder="Rate from 1 to 10"
                required>

            </div>

            <div class="input-box">

                <label>Heart Rate (BPM)</label>

                <input type="number"
                name="heart"
                value="{{heart if heart else ''}}"
                placeholder="Example : 80"
                required>

            </div>

            <div class="input-box">

                <label>Daily Steps Count</label>

                <input type="number"
                name="steps"
                value="{{steps if steps else ''}}"
                placeholder="Example : 8000"
                required>

            </div>

        </div>

        <button type="submit">

            Predict Health

        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2 style="color:{{color}}">

            {{prediction}}

        </h2>

        <div class="circle"

        style="
        background:
        conic-gradient(
        #06b6d4 {{score * 3.6}}deg,
        rgba(255,255,255,0.08) 0deg
        );
        ">

            <span>{{score}}</span>

        </div>

        <h3>

            Health Score : {{score}}/100

        </h3>

        <p>

            <b>BMI :</b> {{bmi}}

            <br><br>

            {{tip}}

        </p>

    </div>

    {% endif %}

</div>

</body>

</html>
